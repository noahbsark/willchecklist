  </defs>
  <rect width="780" height="590" rx="38" fill="#f5faf6"/>
  <circle cx="112" cy="104" r="70" fill="#e1f0e9" opacity=".85"/>
  <circle cx="680" cy="482" r="88" fill="#fff3d8" opacity=".72"/>
