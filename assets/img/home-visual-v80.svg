<rect x="486" y="232" width="70" height="12" rx="6" fill="#97aaa3" opacity=".3"/>
<rect x="154" y="294" width="472" height="150" rx="24" fill="#fffef9" stroke="#e6ded0"/>
<g font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-weight="800" font-size="18" fill="#173d36">
  <g transform="translate(186 326)"><circle r="14" fill="#245c52"/><path d="M-6 0l4 4 8-9" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><text x="28" y="6">Setup</text></g>
  <g transform="translate(186 370)"><circle r="14" fill="#245c52"/><path d="M-6 0l4 4 8-9" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><text x="28" y="6">Checklist</text></g>
  <g transform="translate(186 414)"><circle r="14" fill="#dff2ec"/><text text-anchor="middle" y="6" fill="#245c52">3</text><text x="28" y="6">Documents</text></g>
  <g transform="translate(420 326)"><circle r="14" fill="#dff2ec"/><text text-anchor="middle" y="6" fill="#245c52">4</text><text x="28" y="6">Beneficiaries</text></g>
  <g transform="translate(420 370)"><circle r="14" fill="#dff2ec"/><text text-anchor="middle" y="6" fill="#245c52">5</text><text x="28" y="6">Summary</text></g>
  <g transform="translate(420 414)"><circle r="14" fill="#dff2ec"/><text text-anchor="middle" y="6" fill="#245c52">6</text><text x="28" y="6">Final review</text></g>
</g>
<rect x="250" y="464" width="280" height="34" rx="17" fill="url(#mint)"/>
<text x="390" y="486" text-anchor="middle" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-weight="900" font-size="15" fill="#fff">One clear next step</text>
</svg>