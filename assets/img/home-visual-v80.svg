<svg xmlns="http://www.w3.org/2000/svg" width="780" height="590" viewBox="0 0 780 590" role="img" aria-labelledby="title desc">
<title id="title">Six-step checklist preview</title>
<desc id="desc">A simple card preview showing the six Will Checklist steps and one next button.</desc>
<defs>
  <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#fffdf8"/><stop offset="1" stop-color="#eef8f4"/></linearGradient>
  <linearGradient id="mint" x1="0" x2="1"><stop stop-color="#245c52"/><stop offset="1" stop-color="#1f7667"/></linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#173d36" flood-opacity=".16"/></filter>
</defs>
<rect width="780" height="590" rx="56" fill="#fbf8ef"/>
<circle cx="138" cy="118" r="72" fill="#dff2ec"/>
<circle cx="626" cy="450" r="78" fill="#f4dfb5" opacity=".55"/>
<rect x="112" y="86" width="556" height="408" rx="38" fill="url(#bg)" stroke="#e6ded0" filter="url(#shadow)"/>
<rect x="160" y="132" width="246" height="22" rx="11" fill="#dff2ec"/>
<rect x="160" y="178" width="330" height="18" rx="9" fill="#245c52"/>
<rect x="160" y="211" width="276" height="16" rx="8" fill="#97aaa3" opacity=".42"/>
<rect x="160" y="242" width="392" height="16" rx="8" fill="#97aaa3" opacity=".32"/>
<rect x="454" y="150" width="176" height="110" rx="22" fill="#fffaf0" stroke="#eadfca"/>
<rect x="486" y="178" width="92" height="14" rx="7" fill="#245c52"/>
