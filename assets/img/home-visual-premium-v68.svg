    <g transform="translate(152 268)"><rect width="456" height="44" rx="16" fill="#FFFFFF" stroke="#E1EAE5"/><circle cx="28" cy="22" r="13" fill="#1F6B5F"/><path d="M21 22.5l5 5 10-12" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><text x="58" y="28">Setup</text></g>
