  <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#FFFDF6"/><stop offset="1" stop-color="#F8FCF8"/></linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#123A35" flood-opacity="0.15"/></filter>
</defs>
<rect width="760" height="590" rx="42" fill="url(#bg)"/>
<circle cx="94" cy="96" r="46" fill="#DDEFE8" opacity=".9"/>
<circle cx="676" cy="496" r="64" fill="#F4DDC8" opacity=".75"/>
