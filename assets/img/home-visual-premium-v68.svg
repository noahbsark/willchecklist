<svg xmlns="http://www.w3.org/2000/svg" width="760" height="590" viewBox="0 0 760 590" role="img" aria-labelledby="title desc">
<title id="title">Six step will checklist preview</title>
<desc id="desc">A clean preview card showing the six-step Will Checklist flow with simple checkmarks and safe notes.</desc>
<defs>
