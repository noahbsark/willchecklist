<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 590" role="img" aria-labelledby="title desc">
<title id="title">Will Checklist six-step preview</title>
<desc id="desc">A simple interface preview showing six planning steps with safe notes and a finish card.</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fffdf8"/><stop offset="1" stop-color="#eef8f3"/></linearGradient>
  <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#1f6b5f"/><stop offset="1" stop-color="#2f8d7c"/></linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#143d36" flood-opacity=".14"/></filter>
</defs>
<rect x="54" y="44" width="672" height="502" rx="42" fill="url(#bg)" stroke="#dbe9df"/>
<circle cx="650" cy="112" r="68" fill="#f8dc8b" opacity=".55"/>
<circle cx="124" cy="470" r="92" fill="#cfeee3" opacity=".55"/>
<g filter="url(#shadow)">
  <rect x="125" y="92" width="530" height="405" rx="30" fill="#fffef9" stroke="#d7e6dc"/>
</g>
<g transform="translate(160 130)">
  <rect x="0" y="0" width="150" height="34" rx="17" fill="#edf8f3"/>
  <circle cx="19" cy="17" r="10" fill="url(#brand)"/>
  <path d="M14.5 17.4l3.2 3.1 6.2-7" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="38" y="22" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#1f6b5f">safe notes only</text>
</g>
<text x="160" y="198" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" fill="#143d36">Your checklist</text>
<text x="160" y="226" font-family="Inter, Arial, sans-serif" font-size="15" fill="#5a6f69">Six steps. Labels only. Blanks are okay.</text>
<g font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">
  <g transform="translate(160 265)">
    <rect width="460" height="46" rx="16" fill="#f3fbf7" stroke="#cfe7dc"/>
    <circle cx="25" cy="23" r="12" fill="url(#brand)"/><path d="M19 23l4 4 8-9" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="50" y="29" fill="#143d36">Setup</text><text x="360" y="29" fill="#6b7d78" font-size="13">confirmed</text>
  </g>
  <g transform="translate(160 323)">
    <rect width="460" height="46" rx="16" fill="#fffaf0" stroke="#eedfae"/>
    <circle cx="25" cy="23" r="12" fill="#f1c96b"/><text x="21" y="28" fill="#143d36" font-size="14">2</text>
    <text x="50" y="29" fill="#143d36">Checklist</text><text x="347" y="29" fill="#6b7d78" font-size="13">next step</text>
  </g>
  <g transform="translate(160 381)">
    <rect width="216" height="42" rx="15" fill="#ffffff" stroke="#dbe7df"/>
    <circle cx="23" cy="21" r="11" fill="#e8f2ed"/><text x="19" y="26" fill="#537069" font-size="13">3</text>
    <text x="48" y="27" fill="#34544d">Documents</text>
  </g>
  <g transform="translate(404 381)">
    <rect width="216" height="42" rx="15" fill="#ffffff" stroke="#dbe7df"/>
    <circle cx="23" cy="21" r="11" fill="#e8f2ed"/><text x="19" y="26" fill="#537069" font-size="13">4</text>
    <text x="48" y="27" fill="#34544d">Beneficiaries</text>
  </g>
  <g transform="translate(160 435)">
    <rect width="216" height="42" rx="15" fill="#ffffff" stroke="#dbe7df"/>
    <circle cx="23" cy="21" r="11" fill="#e8f2ed"/><text x="19" y="26" fill="#537069" font-size="13">5</text>
    <text x="48" y="27" fill="#34544d">Summary</text>
  </g>
  <g transform="translate(404 435)">
    <rect width="216" height="42" rx="15" fill="#ffffff" stroke="#dbe7df"/>
    <circle cx="23" cy="21" r="11" fill="#e8f2ed"/><text x="19" y="26" fill="#537069" font-size="13">6</text>
    <text x="48" y="27" fill="#34544d">Final review</text>
  </g>
</g>
<g transform="translate(500 146)">
  <rect x="0" y="0" width="112" height="44" rx="22" fill="url(#brand)"/>
  <text x="56" y="28" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" text-anchor="middle" fill="#fff">Continue</text>
</g>
</svg>