<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 500" role="img" aria-labelledby="t d"><title id="t">Simple three step will preparation path</title><desc id="d">Three friendly cards showing start, organize, and summarize.</desc><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#f2faf7"/><stop offset="1" stop-color="#fff7e8"/></linearGradient><filter id="s" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#173f44" flood-opacity=".12"/></filter></defs><rect width="720" height="500" rx="42" fill="url(#bg)"/><path d="M88 350 C190 280 256 400 360 324 S526 235 632 302" fill="none" stroke="#cfded8" stroke-width="18" stroke-linecap="round"/><g filter="url(#s)"><rect x="75" y="125" width="160" height="180" rx="24" fill="#fff" stroke="#dbe5df"/><rect x="280" y="92" width="160" height="215" rx="24" fill="#fff" stroke="#dbe5df"/><rect x="485" y="125" width="160" height="180" rx="24" fill="#fff" stroke="#dbe5df"/></g><circle cx="155" cy="152" r="30" fill="#245c52"/><circle cx="360" cy="120" r="30" fill="#245c52"/><circle cx="565" cy="152" r="30" fill="#245c52"/><text x="155" y="164" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#fff">1</text><text x="360" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#fff">2</text><text x="565" y="164" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#fff">3</text><g font-family="Arial, sans-serif" fill="#172029" text-anchor="middle"><text x="155" y="224" font-size="24" font-weight="700">Start</text><text x="155" y="254" font-size="16" fill="#5c6773">answer a few</text><text x="155" y="276" font-size="16" fill="#5c6773">simple questions</text><text x="360" y="208" font-size="24" font-weight="700">Organize</text><text x="360" y="238" font-size="16" fill="#5c6773">use safe labels</text><text x="360" y="260" font-size="16" fill="#5c6773">and locations</text><text x="565" y="224" font-size="24" font-weight="700">Summarize</text><text x="565" y="254" font-size="16" fill="#5c6773">print or copy</text><text x="565" y="276" font-size="16" fill="#5c6773">your brief</text></g><g fill="none" stroke="#d98c36" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"><path d="M124 389 l24 24 52-62"/><path d="M328 405 l24 24 60-72"/><path d="M535 389 l24 24 52-62"/></g></svg>