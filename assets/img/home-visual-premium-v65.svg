<svg xmlns="http://www.w3.org/2000/svg" width="760" height="590" viewBox="0 0 760 590" role="img" aria-labelledby="title desc">
  <title id="title">Simple six-step checklist preview</title>
  <desc id="desc">A clean card showing six will checklist steps with checkmarks, safe note guidance, and one next button.</desc>
  <defs>
    <linearGradient id="bg" x1="70" y1="30" x2="690" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FEFFF9"/>
      <stop offset="1" stop-color="#EAF8F2"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#1F7A68"/>
      <stop offset="1" stop-color="#124D43"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="760" height="590" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="30" stdDeviation="28" flood-color="#132229" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="760" height="590" rx="42" fill="#F7F1E7"/>
  <circle cx="90" cy="90" r="64" fill="#F3C56D" opacity="0.28"/>
  <circle cx="680" cy="90" r="84" fill="#B9DDD4" opacity="0.34"/>
  <circle cx="650" cy="500" r="120" fill="#F5D8A2" opacity="0.20"/>
  <g filter="url(#shadow)">
    <rect x="100" y="58" width="560" height="474" rx="34" fill="url(#bg)" stroke="#D8E6DE"/>
    <rect x="132" y="92" width="496" height="76" rx="22" fill="#FFFFFF" stroke="#E5E0D7"/>
    <circle cx="170" cy="130" r="20" fill="url(#green)"/>
    <path d="M160.5 130.5l6.2 6.2 13.4-15" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="206" y="124" fill="#17242A" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800">Will Checklist</text>
    <text x="206" y="148" fill="#64737A" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="650">Safe organizer • 6 steps</text>

    <g transform="translate(132 196)">
      <rect width="496" height="226" rx="24" fill="#FFFFFF" stroke="#E5E0D7"/>
      <text x="26" y="42" fill="#17242A" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="850">Your path</text>
      <text x="26" y="67" fill="#64737A" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600">One step at a time. Blanks are okay.</text>
      <g font-family="Inter, Arial, sans-serif" font-size="15" font-weight="760">
        <g transform="translate(26 96)"><circle r="13" cx="13" cy="13" fill="#E8F7F1"/><path d="M7 13l4 4 8-9" stroke="#176357" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="42" y="18" fill="#17242A">Setup</text></g>
        <g transform="translate(26 138)"><circle r="13" cx="13" cy="13" fill="#E8F7F1"/><path d="M7 13l4 4 8-9" stroke="#176357" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="42" y="18" fill="#17242A">Checklist</text></g>
        <g transform="translate(26 180)"><circle r="13" cx="13" cy="13" fill="#E8F7F1"/><path d="M7 13l4 4 8-9" stroke="#176357" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="42" y="18" fill="#17242A">Documents</text></g>
        <g transform="translate(276 96)"><circle r="13" cx="13" cy="13" fill="#FFF3DF"/><text x="9" y="18" fill="#9A6420">4</text><text x="42" y="18" fill="#17242A">Beneficiaries</text></g>
        <g transform="translate(276 138)"><circle r="13" cx="13" cy="13" fill="#FFF3DF"/><text x="9" y="18" fill="#9A6420">5</text><text x="42" y="18" fill="#17242A">Summary</text></g>
        <g transform="translate(276 180)"><circle r="13" cx="13" cy="13" fill="#FFF3DF"/><text x="9" y="18" fill="#9A6420">6</text><text x="42" y="18" fill="#17242A">Final review</text></g>
      </g>
    </g>
    <g transform="translate(132 448)">
      <rect width="316" height="48" rx="24" fill="url(#green)"/>
      <text x="158" y="31" text-anchor="middle" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="850">Save and continue</text>
      <rect x="336" width="160" height="48" rx="24" fill="#FFFFFF" stroke="#D8E6DE"/>
      <text x="416" y="31" text-anchor="middle" fill="#176357" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="850">Print later</text>
    </g>
  </g>
  <g transform="translate(512 70)">
    <rect width="112" height="32" rx="16" fill="#FFF6E7" stroke="#E8D8BA"/>
    <text x="56" y="21" text-anchor="middle" fill="#7A551B" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="850">No secrets</text>
  </g>
</svg>