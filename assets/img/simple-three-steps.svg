<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" role="img" aria-labelledby="title desc">
<title id="title">Simple three step will preparation path</title>
<desc id="desc">Three calm cards labeled Start, Organize, and Finish connected by a simple line.</desc>
<defs>
  <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#f6fbf8"/><stop offset="1" stop-color="#fff6e8"/></linearGradient>
  <filter id="soft" x="-10%" y="-10%" width="120%" height="125%"><feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#172029" flood-opacity=".08"/></filter>
</defs>
<rect width="920" height="520" rx="44" fill="url(#bg)"/>
<path d="M185 260 H735" stroke="#cfd9d3" stroke-width="12" stroke-linecap="round"/>
<g filter="url(#soft)">
  <rect x="70" y="150" width="230" height="220" rx="30" fill="#fffdf8" stroke="#dfe8e2"/>
  <circle cx="130" cy="220" r="38" fill="#245c52"/>
  <path d="M116 220 l10 11 22-26" fill="none" stroke="#fff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="130" y="294" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" text-anchor="middle" fill="#172029">Start</text>
  <text x="130" y="326" font-family="Inter, Arial, sans-serif" font-size="18" text-anchor="middle" fill="#5c6773">Answer a few</text>
  <text x="130" y="350" font-family="Inter, Arial, sans-serif" font-size="18" text-anchor="middle" fill="#5c6773">setup questions</text>
</g>
<g filter="url(#soft)">
  <rect x="345" y="110" width="230" height="300" rx="30" fill="#fffdf8" stroke="#dfe8e2"/>
  <rect x="407" y="178" width="106" height="128" rx="18" fill="#eef7f3" stroke="#b8d0c6"/>
  <path d="M428 218 h64 M428 252 h64 M428 286 h42" stroke="#245c52" stroke-width="9" stroke-linecap="round"/>
  <text x="460" y="340" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" text-anchor="middle" fill="#172029">Organize</text>
  <text x="460" y="372" font-family="Inter, Arial, sans-serif" font-size="18" text-anchor="middle" fill="#5c6773">Documents, people,</text>
  <text x="460" y="396" font-family="Inter, Arial, sans-serif" font-size="18" text-anchor="middle" fill="#5c6773">and safe notes</text>
</g>
<g filter="url(#soft)">
  <rect x="620" y="150" width="230" height="220" rx="30" fill="#fffdf8" stroke="#dfe8e2"/>
  <circle cx="735" cy="220" r="38" fill="#d98c36"/>
  <path d="M716 220 h38 M735 201 v38" stroke="#172029" stroke-width="8" stroke-linecap="round"/>
  <text x="735" y="294" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" text-anchor="middle" fill="#172029">Finish</text>
  <text x="735" y="326" font-family="Inter, Arial, sans-serif" font-size="18" text-anchor="middle" fill="#5c6773">Print or save</text>
  <text x="735" y="350" font-family="Inter, Arial, sans-serif" font-size="18" text-anchor="middle" fill="#5c6773">a summary</text>
</g>
</svg>