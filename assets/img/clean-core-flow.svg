<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
<title id="title">Clean six-step will preparation path</title>
<desc id="desc">A calm visual path showing Start, Checklist, Documents, Beneficiaries, Summary, and Review.</desc>
<defs>
  <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#f6fbf8"/><stop offset="1" stop-color="#eef4ff"/></linearGradient>
  <linearGradient id="card" x1="0" x2="1"><stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#fbfdff"/></linearGradient>
</defs>
<rect width="900" height="520" rx="42" fill="url(#bg)"/>
<path d="M110 260 C230 140, 310 380, 430 260 S640 135, 790 260" fill="none" stroke="#bad6c8" stroke-width="18" stroke-linecap="round"/>
<g font-family="Inter, Arial, sans-serif" text-anchor="middle">
  <g transform="translate(120 260)"><circle r="46" fill="#1f6f50"/><text y="8" fill="white" font-size="28" font-weight="700">1</text><text y="76" fill="#23352d" font-size="20" font-weight="700">Start</text></g>
  <g transform="translate(250 205)"><circle r="46" fill="#ffffff" stroke="#1f6f50" stroke-width="6"/><text y="8" fill="#1f6f50" font-size="28" font-weight="700">2</text><text y="76" fill="#23352d" font-size="20" font-weight="700">Checklist</text></g>
  <g transform="translate(380 315)"><circle r="46" fill="#ffffff" stroke="#1f6f50" stroke-width="6"/><text y="8" fill="#1f6f50" font-size="28" font-weight="700">3</text><text y="76" fill="#23352d" font-size="20" font-weight="700">Documents</text></g>
  <g transform="translate(520 205)"><circle r="46" fill="#ffffff" stroke="#1f6f50" stroke-width="6"/><text y="8" fill="#1f6f50" font-size="28" font-weight="700">4</text><text y="76" fill="#23352d" font-size="20" font-weight="700">People</text></g>
  <g transform="translate(650 315)"><circle r="46" fill="#ffffff" stroke="#1f6f50" stroke-width="6"/><text y="8" fill="#1f6f50" font-size="28" font-weight="700">5</text><text y="76" fill="#23352d" font-size="20" font-weight="700">Summary</text></g>
  <g transform="translate(780 260)"><circle r="46" fill="#d9efe4" stroke="#1f6f50" stroke-width="6"/><text y="8" fill="#1f6f50" font-size="28" font-weight="700">6</text><text y="76" fill="#23352d" font-size="20" font-weight="700">Review</text></g>
</g>
<rect x="230" y="58" width="440" height="64" rx="22" fill="url(#card)" stroke="#d9e7df"/>
<text x="450" y="97" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#193327">One clear path. No guesswork.</text>
</svg>