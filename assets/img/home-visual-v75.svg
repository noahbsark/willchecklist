<svg xmlns="http://www.w3.org/2000/svg" width="780" height="590" viewBox="0 0 780 590" role="img" aria-labelledby="title desc">
<title id="title">Will Checklist six-step preview</title>
<desc id="desc">A calm checklist interface preview showing six steps, safe note guidance, and a clear continue button.</desc>
<defs>
  <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
    <stop offset="0" stop-color="#f8fffb"/>
    <stop offset="1" stop-color="#fff7e8"/>
  </linearGradient>
  <linearGradient id="brand" x1="0" x2="1" y1="0" y2="1">
    <stop offset="0" stop-color="#2f7568"/>
    <stop offset="1" stop-color="#17443d"/>
  </linearGradient>
  <filter id="shadow" x="-10%" y="-10%" width="120%" height="125%">
    <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#172029" flood-opacity="0.16"/>
  </filter>
</defs>
<rect width="780" height="590" rx="44" fill="#f5efe3"/>
<circle cx="682" cy="102" r="78" fill="#e7f4ef" opacity=".9"/>
<circle cx="78" cy="490" r="110" fill="#fff3df" opacity=".95"/>
<g filter="url(#shadow)">
  <rect x="88" y="62" width="604" height="466" rx="34" fill="url(#bg)" stroke="#ded8cb"/>
</g>
<rect x="124" y="98" width="532" height="58" rx="20" fill="#ffffff" stroke="#e2ded2"/>
<circle cx="154" cy="127" r="16" fill="url(#brand)"/>
<path d="M146 127l6 6 12-15" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
<text x="184" y="122" font-family="Inter,Arial,sans-serif" font-size="19" font-weight="800" fill="#172029">Will Checklist</text>
<text x="184" y="143" font-family="Inter,Arial,sans-serif" font-size="12" font-weight="700" fill="#6b7674">safe prep organizer</text>
<rect x="520" y="115" width="104" height="28" rx="14" fill="#e7f4ef"/>
<text x="542" y="134" font-family="Inter,Arial,sans-serif" font-size="12" font-weight="800" fill="#245c52">Step 2 of 6</text>
<text x="124" y="204" font-family="Inter,Arial,sans-serif" font-size="15" font-weight="800" fill="#245c52">Safe notes only</text>
<text x="124" y="230" font-family="Inter,Arial,sans-serif" font-size="34" font-weight="900" fill="#172029">Checklist</text>
<text x="124" y="259" font-family="Inter,Arial,sans-serif" font-size="16" font-weight="600" fill="#5d6b68">Check what applies. Leave blanks if unsure.</text>
<rect x="124" y="286" width="532" height="46" rx="16" fill="#fff9ef" stroke="#efd7ab"/>
<text x="146" y="315" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="700" fill="#584630">Use labels and locations — not passwords or private numbers.</text>
<g>
  <rect x="124" y="354" width="532" height="48" rx="15" fill="#ffffff" stroke="#e2ded2"/>
  <rect x="146" y="369" width="18" height="18" rx="5" fill="#245c52"/>
  <path d="M151 378l4 4 8-10" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="182" y="384" font-family="Inter,Arial,sans-serif" font-size="15" font-weight="750" fill="#24312f">Names of people to review</text>
</g>
<g>
  <rect x="124" y="414" width="532" height="48" rx="15" fill="#ffffff" stroke="#e2ded2"/>
  <rect x="146" y="429" width="18" height="18" rx="5" fill="#f6fbf8" stroke="#b9d5cd"/>
  <text x="182" y="444" font-family="Inter,Arial,sans-serif" font-size="15" font-weight="750" fill="#24312f">Document locations to gather</text>
</g>
<rect x="124" y="484" width="218" height="42" rx="21" fill="url(#brand)"/>
<text x="154" y="511" font-family="Inter,Arial,sans-serif" font-size="15" font-weight="850" fill="#ffffff">Save and continue</text>
</svg>