<svg xmlns="http://www.w3.org/2000/svg" width="780" height="590" viewBox="0 0 780 590" role="img" aria-labelledby="title desc">
<title id="title">Six-step will checklist preview</title>
<desc id="desc">A calm product-style preview showing a simple six-step checklist with safe notes and a finish button.</desc>
<defs>
  <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#fffdf7"/><stop offset="1" stop-color="#eef8f3"/></linearGradient>
  <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#fbf7ee"/></linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="24" stdDeviation="18" flood-color="#14342f" flood-opacity="0.16"/></filter>
</defs>
<rect width="780" height="590" rx="46" fill="url(#bg)"/>
<circle cx="118" cy="102" r="70" fill="#e6f4ed" opacity=".8"/>
<circle cx="683" cy="90" r="92" fill="#fff0d8" opacity=".85"/>
<g filter="url(#shadow)">
  <rect x="92" y="76" width="596" height="438" rx="34" fill="url(#panel)" stroke="#e0d7c8"/>
  <rect x="126" y="112" width="528" height="74" rx="24" fill="#f6fbf8" stroke="#d9eee5"/>
  <circle cx="164" cy="149" r="17" fill="#245c52"/>
  <path d="M156 149l6 6 12-14" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="196" y="146" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800" fill="#183c36">Will Checklist</text>
  <text x="196" y="170" font-family="Inter, Arial, sans-serif" font-size="14" fill="#61706d">Safe prep notes only</text>
  <g transform="translate(126 216)">
    <rect width="528" height="42" rx="16" fill="#245c52" opacity=".10"/>
    <text x="20" y="27" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#245c52">1 Setup</text>
    <text x="116" y="27" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#245c52">2 Checklist</text>
    <text x="244" y="27" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#245c52">3 Documents</text>
    <text x="392" y="27" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#245c52">Finish</text>
  </g>
  <g transform="translate(126 284)">
    <text x="0" y="0" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800" fill="#172923">Step 2: Checklist</text>
    <text x="0" y="32" font-family="Inter, Arial, sans-serif" font-size="16" fill="#66736f">Check what applies. Leave blanks if unsure.</text>
    <g transform="translate(0 62)">
      <rect width="528" height="54" rx="18" fill="#ffffff" stroke="#e3dbce"/>
      <circle cx="27" cy="27" r="12" fill="#dff1eb" stroke="#245c52"/>
      <path d="M21 27l5 5 10-12" fill="none" stroke="#245c52" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="54" y="32" font-family="Inter, Arial, sans-serif" font-size="16" fill="#31403d">List the people involved</text>
    </g>
    <g transform="translate(0 128)">
      <rect width="528" height="54" rx="18" fill="#ffffff" stroke="#e3dbce"/>
      <circle cx="27" cy="27" r="12" fill="#fff" stroke="#b8c8c3"/>
      <text x="54" y="32" font-family="Inter, Arial, sans-serif" font-size="16" fill="#31403d">Find important documents</text>
    </g>
    <g transform="translate(0 204)">
      <rect width="232" height="54" rx="18" fill="#245c52"/>
      <text x="32" y="34" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800" fill="#ffffff">Save and continue</text>
    </g>
  </g>
</g>
</svg>