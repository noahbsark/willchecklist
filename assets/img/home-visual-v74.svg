  <text x="58" y="25" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#172029">Checklist</text>
  <text x="58" y="43" font-family="Arial, sans-serif" font-size="12" fill="#5c6773">Check what applies</text>
</g>
<g transform="translate(154 362)">
