<svg xmlns="http://www.w3.org/2000/svg" width="780" height="590" viewBox="0 0 780 590" role="img" aria-labelledby="title desc">
<title id="title">Six-step will checklist preview</title>
<desc id="desc">A calm product-style preview showing the six steps of the Will Checklist organizer.</desc>
<defs>
