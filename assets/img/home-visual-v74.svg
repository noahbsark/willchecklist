  <linearGradient id="card" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#fffef9"/><stop offset="1" stop-color="#fbf7ee"/></linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#172029" flood-opacity=".14"/></filter>
</defs>
<rect width="780" height="590" rx="42" fill="url(#bg)"/>
<circle cx="664" cy="78" r="74" fill="#e7f4ef" opacity=".88"/>
<circle cx="108" cy="496" r="92" fill="#fff0d8" opacity=".95"/>
<g filter="url(#shadow)">
