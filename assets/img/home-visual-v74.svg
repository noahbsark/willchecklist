  <text x="58" y="25" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#172029">Documents</text>
  <text x="58" y="43" font-family="Arial, sans-serif" font-size="12" fill="#5c6773">Use labels and locations</text>
</g>
