</g>
<rect x="154" y="116" width="250" height="22" rx="11" fill="#245c52" opacity=".95"/>
<rect x="154" y="154" width="392" height="14" rx="7" fill="#dbe7e2"/>
<rect x="154" y="180" width="312" height="14" rx="7" fill="#e8ded0"/>
