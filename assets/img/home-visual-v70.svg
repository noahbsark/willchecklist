<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 590" role="img" aria-labelledby="title desc">
<title id="title">Six-step checklist preview</title>
<desc id="desc">A clean product preview card showing the six-step will checklist flow.</desc>
<defs>
