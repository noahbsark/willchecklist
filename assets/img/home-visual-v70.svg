    </g>
    <g transform="translate(148 278)">
      <rect width="464" height="48" rx="16" fill="#eef8f3" stroke="#cce7dd"/>
      <circle cx="28" cy="24" r="14" fill="#1f6b5f"/><path d="M21 24l5 5 10-12" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="58" y="30" font-size="16" font-weight="800" fill="#24413c">Checklist</text>
