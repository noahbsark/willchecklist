    <stop offset="0" stop-color="#f4fbf7"/>
    <stop offset="1" stop-color="#fff8e9"/>
  </linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#143f39" flood-opacity="0.13"/>
  </filter>
</defs>
<rect width="760" height="590" rx="46" fill="url(#bg)"/>
<circle cx="662" cy="86" r="82" fill="#dff1ea" opacity=".72"/>
<circle cx="92" cy="504" r="96" fill="#f4dfb2" opacity=".38"/>
